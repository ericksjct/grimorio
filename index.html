<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Grimório · Magias de D&D 5e</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="description" content="Grimório de magias de D&D 5e — prepare, marque como favorita, filtre por classe / nível / escola e imprima a lista de magias do seu personagem. PT-BR e EN, edições 2014 e 2024."/>
<meta name="theme-color" content="#f8f7f3"/>
<meta name="color-scheme" content="light"/>

<!-- Favicon: SVG transparente (fita de preparada + estrela de favorita) -->
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>

<!-- Open Graph / share-build previews -->
<meta property="og:type" content="website"/>
<meta property="og:title" content="Grimório · Magias de D&D 5e"/>
<meta property="og:description" content="Prepare, favorite e imprima as magias do seu personagem de D&D 5e."/>
<meta property="og:locale" content="pt_BR"/>

<!-- Fontes (Texturina display + JetBrains Mono) agora são self-hosted nos
     @font-face de hifi-tokens.css → fonts/*.woff2. Sem <link> pro Google Fonts:
     evita render-blocking, vazamento de IP pro Google e funciona offline. -->
<!-- V11 design tokens (Catppuccin / Nord / Monokai / Solarized) + @font-face (Marauder, Texturina, JetBrains Mono) -->
<link rel="stylesheet" href="hifi-tokens.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f8f7f3; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  * { box-sizing: border-box; }
  #root { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }
  /* Fundo do body segue o --base do tema ativo (claro ou escuro), pra não
     deixar faixa de cor errada no overscroll / safe-area. #f8f7f3 é só o
     fallback antes do React montar e aplicar a classe do tema. */
  body.hifi { background: var(--base, #f8f7f3); }

  /* Boot / loading state — shown until React mounts (and while the first
     spell JSON is fetched). Uses the mono face so it matches the chrome. */
  .od-boot {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    font-family: 'JetBrains Mono', ui-monospace, monospace; color: #5a5747;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    background: #f8f7f3;
  }
  .od-boot__mark {
    font-family: 'Texturina', Georgia, serif; font-weight: 700;
    font-variant: small-caps; letter-spacing: 0.06em;
    font-size: 26px; color: #272822; text-transform: none;
  }
  .od-boot__dots { display: inline-flex; gap: 5px; }
  .od-boot__dots i {
    width: 6px; height: 6px; border-radius: 50%; background: #c5bca6;
    animation: od-pulse 1s ease-in-out infinite;
  }
  .od-boot__dots i:nth-child(2) { animation-delay: 0.15s; }
  .od-boot__dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes od-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; background: #8e63d6; } }
  @media (prefers-reduced-motion: reduce) { .od-boot__dots i { animation: none; } }

  /* Fallback shown only if React/Babel fail to load (e.g. offline CDN). */
  .od-fallback { max-width: 360px; text-align: center; line-height: 1.6; text-transform: none; letter-spacing: 0; }
</style>
</head>
<body>
<div id="root">
  <div class="od-boot">
    <div class="od-boot__mark">Grimório</div>
    <div class="od-boot__dots"><i></i><i></i><i></i></div>
    <noscript><div class="od-fallback">Este grimório precisa de JavaScript ativado.</div></noscript>
  </div>
</div>

<!-- React + Babel standalone (pinned). Babel transpiles the JSX modules below
     in the browser, so this same folder works locally (file://), in the preview,
     and on GitHub Pages with no build step. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Production dependency set for the V11 (hi-fi) product.
     ORDER MATTERS: helpers define spellName / schoolKey / v8Description that the
     components call by bare reference; the loader overrides v7BuildSpells with
     real JSON data; the editor + hi-fi shell consume both. -->
<script type="text/babel" src="grimorio-helpers.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="spells-data-loader.jsx"></script>
<script type="text/babel" src="v11-character-editor.jsx"></script>
<script type="text/babel" src="v10-hifi.jsx"></script>

<script type="text/babel">
// ── UI prefs persistence (dark mode + active character survive a refresh) ──
const UI_PREFS_KEY = 'spellbook-ui-prefs';
function loadPrefs() {
  try { return JSON.parse(localStorage.getItem(UI_PREFS_KEY)) || {}; } catch (e) { return {}; }
}
function savePrefs(p) {
  try { localStorage.setItem(UI_PREFS_KEY, JSON.stringify(p)); } catch (e) {}
}

// Idioma da UI segue a VERSÃO de magias ativa (acoplado): não há toggle
// separado — escolher uma versão EN deixa o chrome em inglês. Na primeira
// visita (sem versão salva) detectamos pelo idioma do navegador.
function detectLang() {
  try {
    const nav = (navigator.languages && navigator.languages[0]) || navigator.language || '';
    return String(nav).toLowerCase().startsWith('pt') ? 'ptbr' : 'en';
  } catch (e) { return 'ptbr'; }
}
// Primeira versão de magias que casa com o idioma (2024 vem primeiro por idioma
// em SPELL_VERSIONS), usada como default na primeira visita.
function defaultVersionKeyForLang(lang) {
  const vs = window.SPELL_VERSIONS || [];
  const v = vs.find(x => x.lang === lang) || vs[0];
  return v ? v.key : '';
}
function langOfVersionKey(key) {
  const vs = window.SPELL_VERSIONS || [];
  const v = vs.find(x => x.key === key);
  return v ? v.lang : null;
}

// Track viewport so we can swap desktop ⇆ mobile layout responsively.
// This is what makes one HTML file work on desktop web, iOS and Android.
function useViewport() {
  const [size, setSize] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => {
    let raf = 0;
    const onResize = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => setSize({ w: window.innerWidth, h: window.innerHeight }));
    };
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);
    return () => {
      window.removeEventListener('resize', onResize);
      window.removeEventListener('orientationchange', onResize);
      cancelAnimationFrame(raf);
    };
  }, []);
  return size;
}

function App() {
  const initial = React.useRef(loadPrefs()).current;
  // Design system canônico: tema "Claro (carta)" = 'daylight'. Só o modo
  // claro/escuro alterna (toggle da vela); o modo é persistido.
  const [dark, setDark] = React.useState(initial.dark ?? false);
  const [theme, setTheme] = React.useState('daylight');
  const [charName, setCharName] = React.useState(initial.characterName || null);
  // Versão de magias ativa (PT/EN × 2014/2024). É a fonte única de verdade do
  // idioma: salva → senão a que casa com o idioma do navegador (1ª visita). O
  // loader deriva o MESMO, então não há troca dupla nem flash no boot.
  const initialVersionKey = initial.versionKey || defaultVersionKeyForLang(initial.lang || detectLang());
  const [versionKey, setVersionKey] = React.useState(initialVersionKey);
  // Idioma do chrome — segue a versão (acoplado): usa lang salvo, senão o da
  // versão inicial, senão detecta. Mantido em sincronia pelo effect abaixo.
  const [lang, setLang] = React.useState(
    initial.lang || langOfVersionKey(initialVersionKey) || detectLang()
  );

  const { chars } = useCharacters();
  const { w, h } = useViewport();
  // Mobile pela MENOR dimensão: assim um celular usa o layout mobile nas duas
  // orientações (em paisagem a largura passa de 768, mas a altura ~390 não — o
  // layout desktop com zoom deixaria o card maior que a tela). Tablets/desktop,
  // com a menor dimensão >= 768, seguem no layout desktop.
  const isMobile = Math.min(w, h) < 768;

  const character = chars.find(c => c.name === charName) || chars[0];

  // Restaura a versão de magias salva (ou o default do idioma detectado) no
  // loader, uma vez, no mount. Dispara o evento que o useSpellVersions escuta.
  React.useEffect(() => {
    if (versionKey && typeof window.setCurrentSpellVersion === 'function') {
      window.setCurrentSpellVersion(versionKey);
    }
  }, []);

  // Acoplamento: a versão ativa é a fonte de verdade do idioma. Quando ela muda
  // (pelo VersionSelector, em qualquer lugar do app), espelhamos a versão e
  // derivamos o idioma do chrome — escolher uma versão EN deixa a UI em inglês.
  React.useEffect(() => {
    const onSourceChanged = (e) => {
      const key = e.detail;
      setVersionKey(key);
      const l = langOfVersionKey(key);
      if (l) setLang(l);
    };
    window.addEventListener('hifi-spells-source-changed', onSourceChanged);
    return () => window.removeEventListener('hifi-spells-source-changed', onSourceChanged);
  }, []);

  // Persist prefs whenever they change (tema, modo, personagem, idioma, versão).
  React.useEffect(() => {
    savePrefs({ dark, theme, characterName: character ? character.name : null, lang, versionKey });
  }, [dark, theme, character, lang, versionKey]);

  // Paint the page background with the active theme so there's no flash of
  // the wrong color around the app (matters on overscroll / safe areas).
  React.useEffect(() => {
    document.body.className =
      `hifi ${dark ? 'hifi-dark' : 'hifi-light'}` +
      (theme && theme !== 'catppuccin' ? ' hifi-theme-' + theme : '');
    // Acompanha o chrome do navegador (mobile) e o color-scheme ao tema ativo.
    try {
      const base = getComputedStyle(document.body).getPropertyValue('--base').trim();
      const tc = document.querySelector('meta[name="theme-color"]');
      if (tc && base) tc.setAttribute('content', base);
      document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
    } catch (e) {}
  }, [dark, theme]);

  // Reflete o idioma ativo no documento: <html lang> (leitores de tela usam pra
  // escolher a pronúncia) e og:locale (preview de compartilhamento).
  React.useEffect(() => {
    try {
      document.documentElement.setAttribute('lang', lang === 'ptbr' ? 'pt-br' : 'en');
      const og = document.querySelector('meta[property="og:locale"]');
      if (og) og.setAttribute('content', lang === 'ptbr' ? 'pt_BR' : 'en_US');
    } catch (e) {}
  }, [lang]);

  // Wire up the global hooks the V11 components call (dark toggle, character
  // switch after create/edit/delete, share-build link).
  React.useEffect(() => {
    window.__setCharacterByName = (name) => setCharName(name);
    window.__toggleDark = () => setDark(d => !d);
    window.__setDark = (v) => setDark(!!v);
    window.__setTheme = (t) => setTheme(t);
    // Seletor de temas: aplica tema + modo de uma vez.
    window.__setThemePreset = (t, d) => { setTheme(t); setDark(!!d); };
    window.__shareBuild = () => {
      const c = chars.find(x => x.name === (character ? character.name : null)) || chars[0];
      if (!c) return;
      const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
        name: c.name, accentId: c.accentId,
        prepared: c.prepared || [], bookmarked: (typeof loadBookmarks === 'function' ? loadBookmarks() : []),
      }))));
      const url = `${window.location.origin}${window.location.pathname}?build=${payload}`;
      if (navigator.share) {
        navigator.share({ title: `Grimório · ${c.name}`, url }).catch(() => {});
      } else if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(url).then(
          () => window.dispatchEvent(new CustomEvent('hifi-toast', { detail: { msg: 'Link da build copiado' } })),
          () => {},
        );
      }
    };
    return () => {
      window.__setCharacterByName = null;
      window.__toggleDark = null;
      window.__setDark = null;
      window.__setTheme = null;
      window.__setThemePreset = null;
      window.__shareBuild = null;
    };
  }, [chars, character]);

  // If the active character is deleted, fall back to the first one.
  React.useEffect(() => {
    if (chars.length && !chars.find(c => c.name === charName)) {
      setCharName(chars[0].name);
    }
  }, [chars, charName]);

  if (!character) return null;

  return (
    <>
      {isMobile
        ? <HifiMobile lang={lang} dark={dark} theme={theme} character={character} />
        : <HifiDesktop lang={lang} dark={dark} theme={theme} character={character} width={w} height={h} />}
      <HifiPrintRoot />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
