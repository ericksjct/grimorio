<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellbook Editor - D&amp;D 5E</title>
<style>
/* ============================================================
   CATPPUCCIN MOCHA (dark) + SYSTEM FONTS
   ============================================================ */
:root {
  --base: #1e1e2e; --mantle: #181825; --crust: #11111b;
  --surface0: #313244; --surface1: #45475a; --surface2: #585b70;
  --overlay0: #6c7086; --overlay1: #7f849c; --overlay2: #9399b2;
  --subtext0: #a6adc8; --subtext1: #bac2de; --text: #cdd6f4;
  --rosewater: #f5e0dc; --flamingo: #f2cdcd; --pink: #f5c2e7;
  --mauve: #cba6f7; --red: #f38ba8; --maroon: #eba0ac; --peach: #fab387;
  --yellow: #f9e2af; --green: #a6e3a1; --teal: #94e2d5;
  --sky: #89dceb; --sapphire: #74c7ec; --blue: #89b4fa; --lavender: #b4befe;
  --accent: #89b4fa;
  --level-0: #6c7086; --level-1: #89dceb; --level-2: #74c7ec; --level-3: #89b4fa;
  --level-4: #b4befe; --level-5: #cba6f7; --level-6: #f5c2e7; --level-7: #fab387;
  --level-8: #f38ba8; --level-9: #a6e3a1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--base);
  color: var(--text);
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--surface2); }

/* ============================================================
   LAYOUT
   ============================================================ */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--surface0);
  background: var(--mantle);
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

.version-select {
  background: var(--surface0);
  border: 1px solid var(--surface1);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.version-select:focus { outline: none; border-color: var(--accent); }

.body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ============================================================
   SIDEBAR (Characters)
   ============================================================ */
.sidebar {
  width: 240px;
  background: var(--mantle);
  border-right: 1px solid var(--surface0);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--surface0);
}

.sidebar-header h2 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--overlay0);
  font-weight: 600;
  margin-bottom: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--accent); color: var(--crust); }
.btn-secondary { background: var(--surface0); color: var(--text); }
.btn-ghost { background: transparent; color: var(--subtext0); }
.btn-ghost:hover { color: var(--text); background: var(--surface0); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-danger { background: var(--red); color: var(--crust); }

.character-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.character-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.character-item:hover { background: var(--surface0); }
.character-item.active { background: var(--surface0); }

.char-color {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.char-info { flex: 1; min-width: 0; }
.char-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.char-meta {
  font-size: 11px;
  color: var(--overlay0);
  margin-top: 2px;
}

.char-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}
.character-item:hover .char-actions { opacity: 1; }

.icon-btn {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--overlay0);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.icon-btn:hover { background: var(--surface1); color: var(--text); }

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--base);
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--surface0);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border-radius: 6px;
  border: 1px solid var(--surface0);
  background: var(--mantle);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.search-box input:focus { outline: none; border-color: var(--accent); }
.search-box input::placeholder { color: var(--overlay0); }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--overlay0);
  font-size: 12px;
}

.tabs {
  display: flex;
  gap: 4px;
}
.tab {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--overlay0);
  font-family: inherit;
}
.tab:hover { color: var(--text); background: var(--surface0); }
.tab.active { background: var(--surface0); color: var(--text); }

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--overlay0);
  font-weight: 600;
}

.pill {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--surface0);
  background: var(--mantle);
  color: var(--subtext0);
  font-family: inherit;
  transition: all 0.15s;
}
.pill:hover { border-color: var(--surface2); color: var(--text); }
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--crust);
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 20px;
}

/* ============================================================
   SPELL LIST
   ============================================================ */
.spell-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  font-size: 12px;
  color: var(--overlay0);
  border-bottom: 1px solid var(--surface0);
  position: sticky;
  top: 0;
  background: var(--base);
  z-index: 10;
}

.spell-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--surface0);
  cursor: pointer;
  transition: background 0.1s;
}
.spell-row:hover { background: var(--mantle); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }

.spell-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}
.spell-row:hover .spell-actions { opacity: 1; }

.action-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid var(--surface0);
  background: var(--mantle);
  color: var(--overlay0);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.action-btn:hover { border-color: var(--surface2); color: var(--text); }
.action-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--crust);
}
.action-btn.fav.active {
  background: var(--yellow);
  border-color: var(--yellow);
  color: var(--crust);
}

.spell-info { flex: 1; min-width: 0; }
.spell-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.spell-meta {
  font-size: 11px;
  color: var(--overlay0);
  margin-top: 2px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.spell-meta span { display: flex; align-items: center; gap: 3px; }

.spell-level {
  font-size: 11px;
  font-weight: 600;
  color: var(--level-0);
  width: 40px;
  text-align: right;
  flex-shrink: 0;
}

.spell-tags {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  background: var(--surface0);
  color: var(--subtext0);
}

/* Level colors */
.level-0 { color: var(--level-0); }
.level-1 { color: var(--level-1); }
.level-2 { color: var(--level-2); }
.level-3 { color: var(--level-3); }
.level-4 { color: var(--level-4); }
.level-5 { color: var(--level-5); }
.level-6 { color: var(--level-6); }
.level-7 { color: var(--level-7); }
.level-8 { color: var(--level-8); }
.level-9 { color: var(--level-9); }

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal {
  background: var(--mantle);
  border-radius: 12px;
  border: 1px solid var(--surface0);
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--surface0);
}
.modal-header h3 {
  font-size: 16px;
  font-weight: 600;
}

.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
}

.modal-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding: 12px 20px;
  border-top: 1px solid var(--surface0);
}

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--subtext0);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid var(--surface0);
  background: var(--base);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.form-group input:focus { outline: none; border-color: var(--accent); }

.color-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.color-option {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s;
}
.color-option:hover { transform: scale(1.1); }
.color-option.selected { border-color: var(--text); }

/* ============================================================
   SPELL DETAIL MODAL
   ============================================================ */
.spell-detail-modal {
  max-width: 560px;
}

.spell-detail-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 16px;
}
.spell-detail-header h2 {
  font-size: 20px;
  font-weight: 700;
  flex: 1;
}
.spell-detail-level {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--surface0);
}

.spell-detail-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.meta-item {
  padding: 8px 12px;
  background: var(--surface0);
  border-radius: 6px;
}
.meta-item label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--overlay0);
  display: block;
  margin-bottom: 2px;
}
.meta-item span {
  font-size: 13px;
  color: var(--text);
}

.spell-detail-desc {
  font-size: 14px;
  line-height: 1.7;
  color: var(--subtext1);
  white-space: pre-wrap;
}
.spell-detail-desc p { margin-bottom: 12px; }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--overlay0);
}
.empty-state h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--subtext0);
  margin-bottom: 8px;
}
.empty-state p {
  font-size: 13px;
  margin-bottom: 16px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--surface0);
    max-height: 180px;
  }
  .body { flex-direction: column; }
  .character-list { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; }
  .character-item {
    flex-direction: column;
    align-items: center;
    min-width: 80px;
    margin-bottom: 0;
    padding: 8px;
  }
  .char-info { text-align: center; }
  .char-actions { opacity: 1; }
  .sidebar-header { padding: 12px; }
  .sidebar-header h2 { display: none; }
}

/* ============================================================
   UTILITIES
   ============================================================ */
.hidden { display: none !important; }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--subtext0);
  font-size: 14px;
}

/* Error */
.error-box {
  padding: 20px;
  text-align: center;
  color: var(--red);
  font-size: 14px;
}
</style>
</head>
<body>
<div id="app" class="app">
  <div class="loading">Carregando magias...</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SPELL_VERSIONS = [
  { key: 'spells-5E-2024-PTBR', file: 'spells-5E-2024-PTBR.json', lang: 'ptbr', label: 'D&D 5.5E 2024', short: '5.5E 2024' },
  { key: 'spells-5E-2014-PTBR', file: 'spells-5E-2014-PTBR.json', lang: 'ptbr', label: 'D&D 5E 2014',   short: '5E 2014' },
  { key: 'spells-5E-2024-EN',   file: 'spells-5E-2024-EN.json',   lang: 'en',   label: 'PHB 2024',      short: '2024 EN' },
  { key: 'spells-5E-2014-EN',   file: 'spells-5E-2014-EN.json',   lang: 'en',   label: 'PHB 2014',      short: '2014 EN' },
];

const ACCENT_SLOTS = [
  { id: 'red',    dark: '#f38ba8', light: '#d20f39' },
  { id: 'orange', dark: '#fab387', light: '#fe640b' },
  { id: 'yellow', dark: '#f9e2af', light: '#df8e1d' },
  { id: 'green',  dark: '#a6e3a1', light: '#40a02b' },
  { id: 'teal',   dark: '#94e2d5', light: '#179299' },
  { id: 'blue',   dark: '#89b4fa', light: '#1e66f5' },
  { id: 'purple', dark: '#cba6f7', light: '#8839ef' },
  { id: 'pink',   dark: '#f5c2e7', light: '#ea76cb' },
];

const SCHOOL_NAMES = [
  'Abjuracao', 'Conjuracao', 'Divinacao', 'Encantamento',
  'Evocacao', 'Ilusao', 'Necromancia', 'Transmutacao'
];

const CLASS_NAMES = ['artifice','barbaro','bardo','bruxo','clerigo','druida','feiticeiro','guerreiro','ladino','mago','monge','paladino','patrulheiro'];

const STORAGE_KEY = 'spellbook-editor-v1';

// ============================================================
// STATE
// ============================================================
let state = {
  versionKey: 'spells-5E-2024-PTBR',
  spells: [],
  characters: [],
  activeCharId: null,
  search: '',
  activeTab: 'all', // all | prepared | favorites
  filters: {
    levels: new Set(),
    schools: new Set(),
    classes: new Set(),
  },
  loading: true,
  error: null,
};

// ============================================================
// DATA LOADING
// ============================================================
async function loadSpells(versionKey) {
  const ver = SPELL_VERSIONS.find(v => v.key === versionKey);
  if (!ver) throw new Error('Versao nao encontrada');

  const res = await fetch(ver.file);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);

  const raw = await res.json();
  return adaptSpells(raw, ver.lang);
}

function adaptSpells(raw, lang) {
  if (!Array.isArray(raw)) raw = [];
  return raw.map((s, i) => {
    const name = s.name || s.nome || `Magia ${i+1}`;
    const en = s.en || s.name || name;
    const pt = s.pt || s.nome || name;
    const lvl = parseInt(s.level ?? s.lvl ?? s.nivel ?? 0, 10) || 0;
    const school = (s.school || s.escola || 'evocacao').toString().toLowerCase().trim();
    const classes = (s.classes || s.class || s.classe || [])
      .map(c => typeof c === 'string' ? c.toLowerCase().trim() : String(c).toLowerCase().trim());

    return {
      id: s.id || `${name}-${i}`,
      name,
      en,
      pt,
      level: lvl,
      school,
      classes,
      castTime: s.castTime || s.casting_time || s.tempo || '',
      range: s.range || s.alcance || s.distance || '',
      duration: s.duration || s.duracao || '',
      components: s.components || s.componentes || '',
      description: s.description || s.descricao || s.desc || '',
      ritual: !!(s.ritual || s.isRitual),
      concentration: !!(s.concentration || s.concentracao || s.isConcentration),
      source: s.source || s.fonte || '',
    };
  });
}

// ============================================================
// LOCAL STORAGE
// ============================================================
function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.versionKey) state.versionKey = data.versionKey;
    if (data.characters) state.characters = data.characters;
    if (data.activeCharId) state.activeCharId = data.activeCharId;
  } catch (e) {
    console.warn('Falha ao carregar storage:', e);
  }
}

function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      versionKey: state.versionKey,
      characters: state.characters,
      activeCharId: state.activeCharId,
    }));
  } catch (e) {
    console.warn('Falha ao salvar storage:', e);
  }
}

// ============================================================
// CHARACTER CRUD
// ============================================================
function createCharacter(name, accentId) {
  const char = {
    id: 'char-' + Date.now(),
    name: name || 'Personagem',
    accent: accentId || 'blue',
    prepared: [], // array of spell IDs
    favorites: [], // array of spell IDs
    createdAt: Date.now(),
  };
  state.characters.push(char);
  state.activeCharId = char.id;
  saveStorage();
  return char;
}

function updateCharacter(id, updates) {
  const char = state.characters.find(c => c.id === id);
  if (!char) return;
  Object.assign(char, updates);
  saveStorage();
}

function deleteCharacter(id) {
  state.characters = state.characters.filter(c => c.id !== id);
  if (state.activeCharId === id) {
    state.activeCharId = state.characters[0]?.id || null;
  }
  saveStorage();
}

function getActiveCharacter() {
  return state.characters.find(c => c.id === state.activeCharId) || null;
}

function toggleSpellPrepared(charId, spellId) {
  const char = state.characters.find(c => c.id === charId);
  if (!char) return;
  const idx = char.prepared.indexOf(spellId);
  if (idx >= 0) char.prepared.splice(idx, 1);
  else char.prepared.push(spellId);
  saveStorage();
}

function toggleSpellFavorite(charId, spellId) {
  const char = state.characters.find(c => c.id === charId);
  if (!char) return;
  const idx = char.favorites.indexOf(spellId);
  if (idx >= 0) char.favorites.splice(idx, 1);
  else char.favorites.push(spellId);
  saveStorage();
}

// ============================================================
// FILTERING
// ============================================================
function getFilteredSpells() {
  const char = getActiveCharacter();
  let list = state.spells;

  // Tab filter
  if (state.activeTab === 'prepared' && char) {
    list = list.filter(s => char.prepared.includes(s.id));
  } else if (state.activeTab === 'favorites' && char) {
    list = list.filter(s => char.favorites.includes(s.id));
  }

  // Search
  const q = state.search.trim().toLowerCase();
  if (q) {
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.en.toLowerCase().includes(q) ||
      s.pt.toLowerCase().includes(q)
    );
  }

  // Filters
  if (state.filters.levels.size > 0) {
    list = list.filter(s => state.filters.levels.has(s.level));
  }
  if (state.filters.schools.size > 0) {
    list = list.filter(s => state.filters.schools.has(s.school));
  }
  if (state.filters.classes.size > 0) {
    list = list.filter(s => s.classes.some(c => state.filters.classes.has(c)));
  }

  return list;
}

function toggleFilter(type, value) {
  const set = state.filters[type];
  if (set.has(value)) set.delete(value);
  else set.add(value);
  render();
}

function clearFilters() {
  state.filters.levels.clear();
  state.filters.schools.clear();
  state.filters.classes.clear();
  state.search = '';
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (state.loading) {
    app.innerHTML = '<div class="loading">Carregando magias...</div>';
    return;
  }
  if (state.error) {
    app.innerHTML = `<div class="error-box">${escapeHtml(state.error)}</div>`;
    return;
  }

  const ver = SPELL_VERSIONS.find(v => v.key === state.versionKey);
  const lang = ver?.lang || 'ptbr';
  const filtered = getFilteredSpells();

  app.innerHTML = `
    <header class="header">
      <div class="header-left">
        <h1>Spellbook Editor</h1>
        <select class="version-select" onchange="onVersionChange(this.value)">
          ${SPELL_VERSIONS.map(v => `<option value="${v.key}" ${v.key === state.versionKey ? 'selected' : ''}>${v.label}</option>`).join('')}
        </select>
      </div>
      <div style="font-size:12px;color:var(--overlay0);">${filtered.length} magias</div>
    </header>
    <div class="body">
      ${renderSidebar()}
      ${renderMain(filtered, lang)}
    </div>
  `;
}

function renderSidebar() {
  const chars = state.characters;
  return `
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Personagens</h2>
        <button class="btn btn-primary btn-sm" onclick="openNewCharModal()">
          <span>+</span> Novo
        </button>
      </div>
      <div class="character-list">
        ${chars.length === 0 ? '<div style="padding:12px;color:var(--overlay0);font-size:12px;text-align:center;">Nenhum personagem</div>' : ''}
        ${chars.map(c => {
          const accent = ACCENT_SLOTS.find(a => a.id === c.accent) || ACCENT_SLOTS[5];
          const isActive = c.id === state.activeCharId;
          const prepCount = c.prepared.length;
          const favCount = c.favorites.length;
          return `
            <div class="character-item ${isActive ? 'active' : ''}" onclick="setActiveChar('${c.id}')">
              <div class="char-color" style="background:${accent.dark}"></div>
              <div class="char-info">
                <div class="char-name">${escapeHtml(c.name)}</div>
                <div class="char-meta">${prepCount} prep / ${favCount} fav</div>
              </div>
              <div class="char-actions">
                <button class="icon-btn" onclick="event.stopPropagation();openEditCharModal('${c.id}')" title="Editar">&#9998;</button>
                <button class="icon-btn" onclick="event.stopPropagation();deleteChar('${c.id}')" title="Excluir">&#10005;</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </aside>
  `;
}

function renderMain(filtered, lang) {
  const char = getActiveCharacter();
  const hasFilters = state.search || state.filters.levels.size || state.filters.schools.size || state.filters.classes.size;

  // Collect available values
  const allLevels = [...new Set(state.spells.map(s => s.level))].sort((a,b) => a-b);
  const allSchools = [...new Set(state.spells.map(s => s.school))];
  const allClasses = [...new Set(state.spells.flatMap(s => s.classes))];

  return `
    <main class="main">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Buscar magia..." value="${escapeHtml(state.search)}" oninput="onSearch(this.value)">
        </div>
        <div class="tabs">
          <button class="tab ${state.activeTab === 'all' ? 'active' : ''}" onclick="setTab('all')">Todas</button>
          <button class="tab ${state.activeTab === 'prepared' ? 'active' : ''}" onclick="setTab('prepared')" ${!char ? 'disabled style="opacity:0.4"' : ''}>Preparadas</button>
          <button class="tab ${state.activeTab === 'favorites' ? 'active' : ''}" onclick="setTab('favorites')" ${!char ? 'disabled style="opacity:0.4"' : ''}>Favoritas</button>
        </div>
        ${hasFilters ? `<button class="btn btn-ghost btn-sm" onclick="clearFilters()">Limpar</button>` : ''}
      </div>
      <div class="toolbar" style="padding-top:0;">
        <div class="filter-group">
          <span class="filter-label">Nivel</span>
          ${allLevels.map(l => `
            <button class="pill ${state.filters.levels.has(l) ? 'active' : ''}" onclick="toggleFilter('levels', ${l})">${l === 0 ? (lang === 'ptbr' ? 'Truque' : 'Cantrip') : l}</button>
          `).join('')}
        </div>
        <div class="filter-group">
          <span class="filter-label">Escola</span>
          ${allSchools.map(s => `
            <button class="pill ${state.filters.schools.has(s) ? 'active' : ''}" onclick="toggleFilter('schools', '${s}')">${capitalize(s)}</button>
          `).join('')}
        </div>
        <div class="filter-group">
          <span class="filter-label">Classe</span>
          ${allClasses.slice(0, 6).map(c => `
            <button class="pill ${state.filters.classes.has(c) ? 'active' : ''}" onclick="toggleFilter('classes', '${c}')">${capitalize(c)}</button>
          `).join('')}
          ${allClasses.length > 6 ? `<span style="font-size:11px;color:var(--overlay0);">+${allClasses.length - 6}</span>` : ''}
        </div>
      </div>
      <div class="content">
        <div class="spell-list-header">
          <span>Magia</span>
          <span style="display:flex;gap:16px;">
            <span style="width:60px;text-align:right;">Nivel</span>
            <span style="width:80px;">Tempo</span>
          </span>
        </div>
        ${filtered.length === 0 ? `
          <div class="empty-state">
            <h3>Nenhuma magia encontrada</h3>
            <p>Tente ajustar os filtros ou a busca</p>
            <button class="btn btn-secondary btn-sm" onclick="clearFilters()">Limpar filtros</button>
          </div>
        ` : filtered.map(s => renderSpellRow(s, char)).join('')}
      </div>
    </main>
  `;
}

function renderSpellRow(spell, char) {
  const isPrepared = char?.prepared.includes(spell.id);
  const isFav = char?.favorites.includes(spell.id);
  const levelClass = `level-${Math.min(spell.level, 9)}`;
  const levelText = spell.level === 0 ? 'Truque' : spell.level;

  return `
    <div class="spell-row" onclick="openSpellDetail('${spell.id}')">
      <div class="spell-actions">
        <button class="action-btn ${isPrepared ? 'active' : ''}" onclick="event.stopPropagation();togglePrepared('${spell.id}')" title="Preparar">
          ${isPrepared ? '&#10003;' : '&#9744;'}
        </button>
        <button class="action-btn fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${spell.id}')" title="Favoritar">
          ${isFav ? '&#9733;' : '&#9734;'}
        </button>
      </div>
      <div class="spell-info">
        <div class="spell-name">${escapeHtml(spell.name)}</div>
        <div class="spell-meta">
          <span>${capitalize(spell.school)}</span>
          ${spell.ritual ? '<span style="color:var(--green);">Ritual</span>' : ''}
          ${spell.concentration ? '<span style="color:var(--yellow);">Concentracao</span>' : ''}
          <span>${spell.classes.slice(0, 3).map(c => capitalize(c)).join(', ')}${spell.classes.length > 3 ? '...' : ''}</span>
        </div>
      </div>
      <div class="spell-level ${levelClass}">${levelText}</div>
      <div class="spell-tags">
        <span class="tag">${escapeHtml(spell.castTime || '-')}</span>
      </div>
    </div>
  `;
}

// ============================================================
// MODALS
// ============================================================
function openModal(content) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = content;
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  return overlay;
}

function closeModal(overlay) {
  overlay.remove();
}

function openNewCharModal() {
  const overlay = openModal(`
    <div class="modal">
      <div class="modal-header">
        <h3>Novo Personagem</h3>
        <button class="icon-btn" onclick="this.closest('.modal-overlay').remove()">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="new-char-name" placeholder="Nome do personagem" autofocus>
        </div>
        <div class="form-group">
          <label>Cor</label>
          <div class="color-picker">
            ${ACCENT_SLOTS.map(a => `
              <div class="color-option" data-color="${a.id}" style="background:${a.dark}" onclick="selectColor(this)"></div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitNewChar(this)">Criar</button>
      </div>
    </div>
  `);

  // Select first color by default
  setTimeout(() => {
    const first = overlay.querySelector('.color-option');
    if (first) selectColor(first);
  }, 10);
}

function selectColor(el) {
  document.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function submitNewChar(btn) {
  const name = document.getElementById('new-char-name').value.trim();
  const selected = document.querySelector('.color-option.selected');
  const accent = selected ? selected.dataset.color : 'blue';
  if (!name) {
    document.getElementById('new-char-name').style.borderColor = 'var(--red)';
    return;
  }
  createCharacter(name, accent);
  btn.closest('.modal-overlay').remove();
  render();
}

function openEditCharModal(charId) {
  const char = state.characters.find(c => c.id === charId);
  if (!char) return;

  const overlay = openModal(`
    <div class="modal">
      <div class="modal-header">
        <h3>Editar Personagem</h3>
        <button class="icon-btn" onclick="this.closest('.modal-overlay').remove()">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="edit-char-name" value="${escapeHtml(char.name)}" autofocus>
        </div>
        <div class="form-group">
          <label>Cor</label>
          <div class="color-picker">
            ${ACCENT_SLOTS.map(a => `
              <div class="color-option ${a.id === char.accent ? 'selected' : ''}" data-color="${a.id}" style="background:${a.dark}" onclick="selectColor(this)"></div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" onclick="deleteChar('${char.id}'); this.closest('.modal-overlay').remove();">Excluir</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitEditChar('${char.id}', this)">Salvar</button>
      </div>
    </div>
  `);
}

function submitEditChar(charId, btn) {
  const name = document.getElementById('edit-char-name').value.trim();
  const selected = document.querySelector('.color-option.selected');
  const accent = selected ? selected.dataset.color : 'blue';
  if (!name) return;
  updateCharacter(charId, { name, accent });
  btn.closest('.modal-overlay').remove();
  render();
}

function openSpellDetail(spellId) {
  const spell = state.spells.find(s => s.id === spellId);
  if (!spell) return;

  const char = getActiveCharacter();
  const isPrepared = char?.prepared.includes(spell.id);
  const isFav = char?.favorites.includes(spell.id);

  openModal(`
    <div class="modal spell-detail-modal">
      <div class="modal-header">
        <div class="spell-detail-header" style="margin:0;flex:1;">
          <div>
            <h2>${escapeHtml(spell.name)}</h2>
            <div class="spell-meta" style="margin-top:4px;">
              <span>${capitalize(spell.school)}</span>
              ${spell.ritual ? '<span style="color:var(--green);">Ritual</span>' : ''}
              ${spell.concentration ? '<span style="color:var(--yellow);">Concentracao</span>' : ''}
            </div>
          </div>
          <span class="spell-detail-level">${spell.level === 0 ? 'Truque' : 'Nivel ' + spell.level}</span>
        </div>
        <button class="icon-btn" onclick="this.closest('.modal-overlay').remove()">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="spell-detail-meta">
          <div class="meta-item"><label>Tempo</label><span>${escapeHtml(spell.castTime || '-')}</span></div>
          <div class="meta-item"><label>Alcance</label><span>${escapeHtml(spell.range || '-')}</span></div>
          <div class="meta-item"><label>Duracao</label><span>${escapeHtml(spell.duration || '-')}</span></div>
          <div class="meta-item"><label>Componentes</label><span>${escapeHtml(spell.components || '-')}</span></div>
        </div>
        <div class="spell-detail-desc">${escapeHtml(spell.description || 'Sem descricao.')}</div>
        ${spell.source ? `<div style="margin-top:16px;font-size:11px;color:var(--overlay0);">Fonte: ${escapeHtml(spell.source)}</div>` : ''}
      </div>
      ${char ? `
        <div class="modal-footer">
          <button class="btn ${isPrepared ? 'btn-primary' : 'btn-secondary'}" onclick="togglePrepared('${spell.id}'); this.closest('.modal-overlay').remove(); render();">
            ${isPrepared ? '&#10003; Preparada' : '&#9744; Preparar'}
          </button>
          <button class="btn ${isFav ? 'btn-primary' : 'btn-secondary'}" onclick="toggleFavorite('${spell.id}'); this.closest('.modal-overlay').remove(); render();">
            ${isFav ? '&#9733; Favorita' : '&#9734; Favoritar'}
          </button>
        </div>
      ` : ''}
    </div>
  `);
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function onVersionChange(key) {
  state.versionKey = key;
  state.filters.levels.clear();
  state.filters.schools.clear();
  state.filters.classes.clear();
  state.search = '';
  state.loading = true;
  saveStorage();
  render();
  loadSpells(key).then(spells => {
    state.spells = spells;
    state.loading = false;
    render();
  }).catch(err => {
    state.error = 'Erro ao carregar magias: ' + err.message;
    state.loading = false;
    render();
  });
}

function onSearch(value) {
  state.search = value;
  render();
}

function setTab(tab) {
  state.activeTab = tab;
  render();
}

function setActiveChar(id) {
  state.activeCharId = id;
  saveStorage();
  render();
}

function deleteChar(id) {
  if (!confirm('Excluir personagem?')) return;
  deleteCharacter(id);
  render();
}

function togglePrepared(spellId) {
  const char = getActiveCharacter();
  if (!char) return;
  toggleSpellPrepared(char.id, spellId);
  render();
}

function toggleFavorite(spellId) {
  const char = getActiveCharacter();
  if (!char) return;
  toggleSpellFavorite(char.id, spellId);
  render();
}

// ============================================================
// UTILS
// ============================================================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function capitalize(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// ============================================================
// INIT
// ============================================================
async function init() {
  loadStorage();
  render();

  try {
    const spells = await loadSpells(state.versionKey);
    state.spells = spells;
    state.loading = false;
    render();
  } catch (err) {
    state.error = 'Erro ao carregar magias: ' + err.message;
    state.loading = false;
    render();
  }
}

init();
</script>
</body>
</html>
