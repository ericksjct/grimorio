<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimório de Magias — D&D 5E</title>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1e1e2e;color:#cdd6f4;line-height:1.5}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font:inherit;color:inherit}

/* ── TOKENS ── */
:root{
  --bg:#1e1e2e;--surface:#313244;--surface1:#45475a;--mantle:#181825;--crust:#11111b;
  --fg:#cdd6f4;--muted:#a6adc8;--subtle:#6c7086;
  --accent:#cba6f7;--accent2:#f5c2e7;
  --green:#a6e3a1;--blue:#89b4fa;--yellow:#f9e2af;--red:#f38ba8;--orange:#fab387;
  --radius:10px;--radius-lg:16px;
}

/* ── LAYOUT ── */
.app{min-height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--surface);padding:16px 20px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-size:1.25rem;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.version-select{background:var(--surface);border:1px solid var(--surface1);border-radius:var(--radius);padding:6px 12px;color:var(--fg);font-size:.875rem;cursor:pointer}
.version-select:focus{outline:2px solid var(--accent);outline-offset:2px}

main{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:20px}

/* ── SEARCH ── */
.search-wrap{margin-bottom:16px}
.search-input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--surface1);border-radius:var(--radius);color:var(--fg);font-size:1rem}
.search-input:focus{outline:2px solid var(--accent);outline-offset:2px;border-color:var(--accent)}
.search-input::placeholder{color:var(--subtle)}

/* ── FILTERS ── */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filter-label{font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);font-weight:600;margin-right:4px}
.pill{padding:5px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--surface1);font-size:.8125rem;color:var(--muted);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--accent);color:var(--fg)}
.pill.active{background:var(--accent);color:var(--crust);border-color:var(--accent);font-weight:600}
.clear-btn{font-size:.8125rem;color:var(--accent);text-decoration:underline;padding:5px 8px}
.clear-btn:hover{color:var(--accent2)}

/* ── COUNT ── */
.count{font-size:.75rem;color:var(--subtle);margin-bottom:12px}

/* ── SPELL LIST ── */
.spell-list{display:flex;flex-direction:column;gap:6px}
.spell-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--surface1);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.spell-row:hover{border-color:var(--accent);background:var(--surface1)}
.spell-name{font-weight:600;color:var(--fg);font-size:.9375rem}
.spell-meta{font-size:.75rem;color:var(--muted);white-space:nowrap}
.spell-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:.6875rem;padding:2px 8px;border-radius:999px;background:var(--mantle);color:var(--muted);border:1px solid var(--surface1)}

/* ── DETAIL MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg);border:1px solid var(--surface1);border-radius:var(--radius-lg);max-width:640px;width:100%;max-height:85vh;overflow:auto;padding:28px;position:relative}
.modal-close{position:absolute;top:12px;right:16px;font-size:1.5rem;color:var(--muted);cursor:pointer;line-height:1}
.modal-close:hover{color:var(--fg)}
.modal h2{font-size:1.375rem;font-weight:700;color:var(--accent);margin-bottom:4px}
.modal .subtitle{font-size:.875rem;color:var(--muted);margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-section h3{font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);margin-bottom:6px;font-weight:600}
.modal-section p,.modal-section li{font-size:.875rem;color:var(--fg);line-height:1.6}
.modal-section ul{padding-left:18px}
.modal-section li{margin-bottom:3px}
.modal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.modal-grid .kv{background:var(--surface);padding:10px 12px;border-radius:var(--radius);border:1px solid var(--surface1)}
.modal-grid .kv-key{font-size:.6875rem;text-transform:uppercase;letter-spacing:.06em;color:var(--subtle);margin-bottom:2px}
.modal-grid .kv-val{font-size:.875rem;color:var(--fg);font-weight:500}

/* ── LOADING ── */
.loading{text-align:center;padding:60px 20px;color:var(--subtle)}
.loading::after{content:"";display:inline-block;width:20px;height:20px;border:2px solid var(--surface1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-left:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
footer{border-top:1px solid var(--surface);padding:16px 20px;text-align:center;font-size:.75rem;color:var(--subtle)}

/* ── MOBILE ── */
@media (max-width:640px){
  header{padding:12px 16px}
  .header-inner{gap:10px}
  .logo{font-size:1.1rem}
  main{padding:12px}
  .spell-row{grid-template-columns:1fr auto;gap:8px}
  .spell-meta:nth-child(3),.spell-meta:nth-child(4){display:none}
  .modal{padding:20px}
  .modal-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-inner">
      <span class="logo">📖 Grimório de Magias</span>
      <select class="version-select" id="versionSelect">
        <option value="spells-5E-2024-PTBR.json">D&D 5.5E 2024 — PT-BR</option>
        <option value="spells-5E-2024-EN.json">D&D 5.5E 2024 — EN</option>
        <option value="spells-5E-2014-PTBR.json">D&D 5E 2014 — PT-BR</option>
        <option value="spells-5E-2014-EN.json">D&D 5E 2014 — EN</option>
      </select>
    </div>
  </header>

  <main>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar magia...">
    </div>

    <div class="filters" id="filterBar">
      <div class="filter-group">
        <span class="filter-label">Nível</span>
        <span id="levelFilters"></span>
      </div>
      <div class="filter-group">
        <span class="filter-label">Escola</span>
        <span id="schoolFilters"></span>
      </div>
      <div class="filter-group">
        <span class="filter-label">Classe</span>
        <span id="classFilters"></span>
      </div>
      <button class="clear-btn" id="clearBtn" style="display:none">Limpar filtros</button>
    </div>

    <div class="count" id="countLabel">Carregando...</div>
    <div class="spell-list" id="spellList"></div>
  </main>

  <footer>Grimório de Magias · D&D 5E · Dados: Wikidot / Simple Skans</footer>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   SPELLBOOK — Vanilla JS, no dependencies
   ═══════════════════════════════════════════════════════ */

const VERSIONS = {
  'spells-5E-2024-PTBR.json': { lang: 'pt', label: 'D&D 5.5E 2024 — PT-BR' },
  'spells-5E-2024-EN.json':   { lang: 'en', label: 'D&D 5.5E 2024 — EN' },
  'spells-5E-2014-PTBR.json': { lang: 'pt', label: 'D&D 5E 2014 — PT-BR' },
  'spells-5E-2014-EN.json':   { lang: 'en', label: 'D&D 5E 2014 — EN' },
};

const SCHOOLS = ['abjuration','conjuration','divination','enchantment','evocation','illusion','necromancy','transmutation'];
const CLASSES = ['bard','cleric','druid','paladin','ranger','sorcerer','warlock','wizard'];
const SCHOOL_PT = {
  abjuration:'Abjuração',conjuration:'Conjuração',divination:'Adivinhação',
  enchantment:'Encantamento',evocation:'Evocação',illusion:'Ilusão',
  necromancy:'Necromancia',transmutation:'Transmutação'
};
const SCHOOL_EN = {
  abjuration:'Abjuration',conjuration:'Conjuration',divination:'Divination',
  enchantment:'Enchantment',evocation:'Evocation',illusion:'Illusion',
  necromancy:'Necromancy',transmutation:'Transmutation'
};
const CLASS_PT = {
  bard:'Bardo',cleric:'Clérigo',druid:'Druida',paladin:'Paladino',
  ranger:'Patrulheiro',sorcerer:'Feiticeiro',warlock:'Bruxo',wizard:'Mago'
};
const CLASS_EN = {
  bard:'Bard',cleric:'Cleric',druid:'Druid',paladin:'Paladin',
  ranger:'Ranger',sorcerer:'Sorcerer',warlock:'Warlock',wizard:'Wizard'
};

let state = {
  version: 'spells-5E-2024-PTBR.json',
  spells: [],
  search: '',
  levels: new Set(),
  schools: new Set(),
  classes: new Set(),
};

/* ── DATA LOADING ── */
async function loadSpells(version) {
  const list = document.getElementById('spellList');
  document.getElementById('countLabel').textContent = 'Carregando...';
  list.innerHTML = '<div class="loading">Carregando magias</div>';

  try {
    const res = await fetch(version);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    state.spells = adaptSpells(raw, VERSIONS[version].lang);
    state.version = version;
    // clear filters on version change
    state.levels = new Set();
    state.schools = new Set();
    state.classes = new Set();
    state.search = '';
    document.getElementById('searchInput').value = '';
    renderFilters();
    renderList();
  } catch (e) {
    list.innerHTML = `<div class="loading" style="color:var(--red)">Erro ao carregar: ${e.message}</div>`;
  }
}

function adaptSpells(raw, lang) {
  const out = [];
  for (const key in raw) {
    const s = raw[key];
    const pt = s.pt || {};
    const en = s.en || {};
    const src = lang === 'pt' ? pt : en;
    const name = src.name || pt.name || en.name || key;
    const level = typeof s.lvl === 'number' ? s.lvl : (typeof pt.lvl === 'number' ? pt.lvl : (typeof en.lvl === 'number' ? en.lvl : 0));
    const school = (s.school || pt.school || en.school || 'evocation').toLowerCase();
    const classes = Array.isArray(s.classes) ? s.classes.map(c => c.toLowerCase()) : [];
    out.push({
      key, name, level, school, classes,
      ritual: !!s.ritual || !!pt.ritual || !!en.ritual,
      concentration: !!s.concentration || !!pt.concentration || !!en.concentration,
      castTime: src.castTime || s.castTime || pt.castTime || en.castTime || '1 ação',
      range: src.range || s.range || pt.range || en.range || 'Toque',
      duration: src.duration || s.duration || pt.duration || en.duration || 'Instantânea',
      components: src.components || s.components || pt.components || en.components || 'V, S',
      description: src.description || s.description || pt.description || en.description || '',
      higherLevels: src.higherLevels || s.higherLevels || pt.higherLevels || en.higherLevels || '',
      source: s.source || pt.source || en.source || '',
      _search: (name + ' ' + school + ' ' + classes.join(' ')).toLowerCase(),
    });
  }
  return out.sort((a, b) => a.name.localeCompare(b.name));
}

/* ── RENDERING ── */
function levelLabel(l, lang) {
  if (l === 0) return lang === 'pt' ? 'Truque' : 'Cantrip';
  return (lang === 'pt' ? 'Nível ' : 'Level ') + l;
}
function schoolLabel(s, lang) { return lang === 'pt' ? (SCHOOL_PT[s] || s) : (SCHOOL_EN[s] || s); }
function classLabel(c, lang) { return lang === 'pt' ? (CLASS_PT[c] || c) : (CLASS_EN[c] || c); }

function renderFilters() {
  const lang = VERSIONS[state.version].lang;
  const allLevels = [...new Set(state.spells.map(s => s.level))].sort((a, b) => a - b);

  document.getElementById('levelFilters').innerHTML = allLevels.map(l =>
    `<button class="pill ${state.levels.has(l) ? 'active' : ''}" data-level="${l}">${levelLabel(l, lang)}</button>`
  ).join('');

  document.getElementById('schoolFilters').innerHTML = SCHOOLS.map(s =>
    state.spells.some(sp => sp.school === s)
      ? `<button class="pill ${state.schools.has(s) ? 'active' : ''}" data-school="${s}">${schoolLabel(s, lang)}</button>`
      : ''
  ).join('');

  document.getElementById('classFilters').innerHTML = CLASSES.map(c =>
    state.spells.some(sp => sp.classes.includes(c))
      ? `<button class="pill ${state.classes.has(c) ? 'active' : ''}" data-class="${c}">${classLabel(c, lang)}</button>`
      : ''
  ).join('');

  const hasFilters = state.search || state.levels.size || state.schools.size || state.classes.size;
  document.getElementById('clearBtn').style.display = hasFilters ? 'inline-block' : 'none';
}

function renderList() {
  const lang = VERSIONS[state.version].lang;
  const q = state.search.trim().toLowerCase();
  const filtered = state.spells.filter(s => {
    if (q && !s._search.includes(q)) return false;
    if (state.levels.size && !state.levels.has(s.level)) return false;
    if (state.schools.size && !state.schools.has(s.school)) return false;
    if (state.classes.size && !s.classes.some(c => state.classes.has(c))) return false;
    return true;
  });

  document.getElementById('countLabel').textContent = `${filtered.length} ${lang === 'pt' ? 'magias encontradas' : 'spells found'}`;

  const list = document.getElementById('spellList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="loading" style="color:var(--subtle)">${lang === 'pt' ? 'Nenhuma magia encontrada' : 'No spells found'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="spell-row" data-key="${s.key}">
      <div>
        <div class="spell-name">${s.name}</div>
        <div class="spell-meta">${levelLabel(s.level, lang)} · ${schoolLabel(s.school, lang)}${s.ritual ? ' · Ritual' : ''}${s.concentration ? (lang === 'pt' ? ' · Concentração' : ' · Concentration') : ''}</div>
      </div>
      <div class="spell-meta">${s.castTime}</div>
      <div class="spell-meta">${s.range}</div>
      <div class="spell-tags">
        ${s.classes.slice(0, 3).map(c => `<span class="tag">${classLabel(c, lang)}</span>`).join('')}
        ${s.classes.length > 3 ? `<span class="tag">+${s.classes.length - 3}</span>` : ''}
      </div>
    </div>
  `).join('');
}

/* ── MODAL ── */
function openModal(spell) {
  const lang = VERSIONS[state.version].lang;
  const desc = spell.description
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  const higher = spell.higherLevels
    ? spell.higherLevels.replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    : '';

  document.getElementById('modalContent').innerHTML = `
    <h2>${spell.name}</h2>
    <div class="subtitle">${levelLabel(spell.level, lang)} · ${schoolLabel(spell.school, lang)}${spell.ritual ? ' · Ritual' : ''}${spell.concentration ? (lang === 'pt' ? ' · Concentração' : ' · Concentration') : ''}</div>
    <div class="modal-grid">
      <div class="kv"><div class="kv-key">${lang === 'pt' ? 'Tempo de Conjuração' : 'Casting Time'}</div><div class="kv-val">${spell.castTime}</div></div>
      <div class="kv"><div class="kv-key">${lang === 'pt' ? 'Alcance' : 'Range'}</div><div class="kv-val">${spell.range}</div></div>
      <div class="kv"><div class="kv-key">${lang === 'pt' ? 'Componentes' : 'Components'}</div><div class="kv-val">${spell.components}</div></div>
      <div class="kv"><div class="kv-key">${lang === 'pt' ? 'Duração' : 'Duration'}</div><div class="kv-val">${spell.duration}</div></div>
    </div>
    <div class="modal-section"><h3>${lang === 'pt' ? 'Descrição' : 'Description'}</h3><p>${desc}</p></div>
    ${higher ? `<div class="modal-section"><h3>${lang === 'pt' ? 'Em Níveis Superiores' : 'At Higher Levels'}</h3><p>${higher}</p></div>` : ''}
    ${spell.source ? `<div class="modal-section" style="margin-top:20px;font-size:.75rem;color:var(--subtle)">${lang === 'pt' ? 'Fonte' : 'Source'}: ${spell.source}</div>` : ''}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

/* ── EVENTS ── */
document.getElementById('versionSelect').addEventListener('change', e => loadSpells(e.target.value));

document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  renderFilters();
  renderList();
});

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  if (btn.dataset.level !== undefined) {
    const v = parseInt(btn.dataset.level);
    state.levels.has(v) ? state.levels.delete(v) : state.levels.add(v);
  } else if (btn.dataset.school !== undefined) {
    const v = btn.dataset.school;
    state.schools.has(v) ? state.schools.delete(v) : state.schools.add(v);
  } else if (btn.dataset.class !== undefined) {
    const v = btn.dataset.class;
    state.classes.has(v) ? state.classes.delete(v) : state.classes.add(v);
  }
  renderFilters();
  renderList();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  state.search = ''; state.levels = new Set(); state.schools = new Set(); state.classes = new Set();
  document.getElementById('searchInput').value = '';
  renderFilters(); renderList();
});

document.getElementById('spellList').addEventListener('click', e => {
  const row = e.target.closest('.spell-row');
  if (!row) return;
  const spell = state.spells.find(s => s.key === row.dataset.key);
  if (spell) openModal(spell);
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── INIT ── */
loadSpells(state.version);
</script>
</body>
</html>
