<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spellbook · V11 (Hi-fi) + Wireframes</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Wireframe fonts -->
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Hi-fi display font (Texturina) -->
<link href="https://fonts.googleapis.com/css2?family=Texturina:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Hi-fi design tokens (Catppuccin) + Marauder @font-face -->
<link rel="stylesheet" href="hifi-tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #f1ece1; font-family: 'Caveat', 'Patrick Hand', cursive; }
  * { box-sizing: border-box; }
</style>
</head>
<body style="background-color: rgb(211, 148, 8)">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="spells-adapter.jsx"></script>
<script type="text/babel" src="spells-data-loader.jsx"></script>
<script type="text/babel" src="wf-primitives.jsx"></script>
<script type="text/babel" src="wf-data.jsx"></script>
<script type="text/babel" src="v8-spell-detail.jsx"></script>
<script type="text/babel" src="v7-ac-prototype.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="v9-mobile.jsx"></script>
<script type="text/babel" src="v11-character-editor.jsx"></script>
<script type="text/babel" src="v10-hifi.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "ptbr",
  "dark": false,
  "theme": "monokai",
  "characterName": "kevin",
  "useRealData": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { chars } = useCharacters();
  const character = chars.find(c => c.name === t.characterName) || chars[0];

  // Load real spell JSON on demand and patch the global builder so every
  // artboard (desktop, mobile, character editor) sees the new data.
  React.useEffect(() => {
    if (!t.useRealData) {
      if (window.__v7BuildSpellsMock) {
        window.v7BuildSpells = window.__v7BuildSpellsMock;
        window.dispatchEvent(new CustomEvent('hifi-spells-source-changed'));
      }
      return;
    }
    if (!window.__v7BuildSpellsMock && window.v7BuildSpells) {
      window.__v7BuildSpellsMock = window.v7BuildSpells;
    }
    let cancelled = false;
    fetch('spells-data.json')
      .then(r => r.json())
      .then(json => {
        if (cancelled) return;
        const real = window.adaptSpells(json);
        window.v7BuildSpells = () => real;
        window.dispatchEvent(new CustomEvent('hifi-spells-source-changed'));
      })
      .catch(err => console.error('Failed to load spells:', err));
    return () => { cancelled = true; };
  }, [t.useRealData]);

  // Let v10 components switch the active character (after create / edit / delete).
  React.useEffect(() => {
    window.__setCharacterByName = (name) => setTweak('characterName', name);
    window.__setDark = (v) => {
      // Auto-pair: nord for dark, monokai for light (user preference).
      setTweak({ dark: !!v, theme: v ? 'nord' : 'monokai' });
    };
    window.__toggleDark = () => {
      const next = !t.dark;
      setTweak({ dark: next, theme: next ? 'nord' : 'monokai' });
    };
    window.__shareBuild = () => {
      // Encode the active character's build into a sharable URL.
      const c = chars.find(x => x.name === t.characterName) || chars[0];
      if (!c) return;
      const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
        name: c.name, accentId: c.accentId,
        prepared: c.prepared || [], bookmarked: c.bookmarked || [],
      }))));
      const url = `${window.location.origin}${window.location.pathname}?build=${payload}`;
      if (navigator.share) {
        navigator.share({ title: `Build · ${c.name}`, url }).catch(() => {});
      } else if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(url).then(
          () => window.dispatchEvent(new CustomEvent('hifi-toast', { detail: { msg: 'Link da build copiado' } })),
          () => {},
        );
      }
    };
    return () => {
      window.__setCharacterByName = null;
      window.__setDark = null;
      window.__toggleDark = null;
      window.__shareBuild = null;
    };
  }, [setTweak, t.dark, t.characterName, chars]);

  // If the current name disappears from the store (e.g. deletion), fall back.
  React.useEffect(() => {
    if (!chars.length) return;
    if (!chars.find(c => c.name === t.characterName)) {
      setTweak('characterName', chars[0].name);
    }
  }, [chars, t.characterName, setTweak]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="v10-hifi" title="V11 · Hi-fi consolidada"
          subtitle="Versão final · 4 temas (Catppuccin · Solarized · Nord · Monokai) com toggle claro/escuro · paleta de personagem dependente do tema · cards de tamanho fixo com descrição + rodapé (V/S/M, alcance, fonte, ritual/concentração) · ícones de nível.">
          <DCArtboard id="hifi-desktop" label="Desktop · grimório" width={1280} height={820}>
            <HifiDesktop lang={t.lang} dark={t.dark} theme={t.theme} character={character}/>
          </DCArtboard>
          <DCArtboard id="hifi-mobile" label="Mobile · lista" width={420} height={800}>
            <HifiMobilePhone lang={t.lang} dark={t.dark} theme={t.theme} character={character}/>
          </DCArtboard>
          <DCArtboard id="hifi-mobile-drawer" label="Mobile · drawer aberto" width={420} height={800}>
            <HifiMobilePhone lang={t.lang} dark={t.dark} theme={t.theme} character={character} drawerOpen/>
          </DCArtboard>
          <DCArtboard id="hifi-mobile-detail" label="Mobile · detalhe" width={420} height={800}>
            <HifiMobilePhone lang={t.lang} dark={t.dark} theme={t.theme} character={character} detailIdx={3}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="v7-proto" title="V7 · Wireframe funcional desktop"
          subtitle="A versão wireframe equivalente — barra + ⌘K + detalhe sincronizados. Útil pra comparar com a hi-fi.">
          <DCArtboard id="v7-functional" label="Wireframe desktop · funcional" width={1280} height={820}>
            <V7ACPrototype lang={t.lang} dark={t.dark}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="v9-mobile" title="V9 · Wireframe funcional mobile"
          subtitle="Drawer com grip handle · busca, filtros, ações, predefinições.">
          <DCArtboard id="v9-list" label="① Lista (drawer fechado)" width={420} height={800}>
            <V9PhoneList lang={t.lang} dark={t.dark}/>
          </DCArtboard>
          <DCArtboard id="v9-drawer" label="② Drawer aberto" width={420} height={800}>
            <V9PhoneDrawerOpen lang={t.lang} dark={t.dark}/>
          </DCArtboard>
          <DCArtboard id="v9-detail" label="③ Detalhe (tela cheia)" width={420} height={800}>
            <V9PhoneDetail lang={t.lang} dark={t.dark}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Idioma"/>
        <TweakRadio  label="Lang" value={t.lang}
          options={['en', 'ptbr']}
          onChange={(v) => setTweak('lang', v)}/>

        <TweakSection label="Tema"/>
        <TweakSelect label="Theme" value={t.theme}
          options={['catppuccin', 'solarized', 'nord', 'monokai']}
          onChange={(v) => setTweak('theme', v)}/>
        <TweakToggle label="Dark mode" value={t.dark}
          onChange={(v) => setTweak('dark', v)}/>

        <TweakSection label="Dados"/>
        <TweakToggle label="Magias reais (5e 2024 PT-BR)" value={t.useRealData}
          onChange={(v) => setTweak('useRealData', v)}/>

        <TweakSection label="Personagem (hi-fi)"/>
        <TweakSelect label="Char" value={t.characterName}
          options={chars.map(c => c.name)}
          onChange={(v) => setTweak('characterName', v)}/>
      </TweaksPanel>

      <HifiPrintRoot/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
