<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grimório de Magias — D&D 5E</title>
  <style>
    :root {
      --bg:      #0f0e0c;
      --surface: #1a1814;
      --fg:      #e8e2d9;
      --muted:   #8a8478;
      --border:  #2d2a24;
      --accent:  #c9a84c;

      --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
      --fg-soft:     color-mix(in oklch, var(--fg) 6%, transparent);

      --font-display: 'Iowan Old Style', 'Charter', Georgia, 'Times New Roman', serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono:    ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;

      --fs-h1: clamp(40px, 5vw, 64px);
      --fs-h2: clamp(26px, 3vw, 36px);
      --fs-h3: 18px;
      --fs-lead: 17px;
      --fs-body: 15px;
      --fs-meta: 12px;

      --gap-xs: 6px;
      --gap-sm: 10px;
      --gap-md: 16px;
      --gap-lg: 24px;
      --gap-xl: 40px;
      --gap-2xl: 72px;
      --container: 1080px;
      --gutter: 24px;

      --radius: 8px;
      --radius-lg: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: 1.55;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    p { text-wrap: pretty; }
    h1, h2, h3, h4 { text-wrap: balance; margin: 0; }

    .container { max-width: var(--container); margin-inline: auto; padding-inline: var(--gutter); }
    .section { padding-block: clamp(40px, 6vw, var(--gap-2xl)); }
    .stack { display: flex; flex-direction: column; }
    .stack > * + * { margin-top: var(--gap-md); }
    .row { display: flex; align-items: center; gap: var(--gap-md); }
    .row-between { display: flex; align-items: center; justify-content: space-between; gap: var(--gap-md); flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap-lg); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap-lg); }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap-md); }
    @media (max-width: 920px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    .h1, h1 { font-family: var(--font-display); font-size: var(--fs-h1); line-height: 1.06; letter-spacing: -0.02em; }
    .h2, h2 { font-family: var(--font-display); font-size: var(--fs-h2); line-height: 1.12; letter-spacing: -0.015em; }
    .h3, h3 { font-size: var(--fs-h3); font-weight: 600; line-height: 1.3; letter-spacing: -0.005em; }
    .lead { font-size: var(--fs-lead); line-height: 1.55; color: var(--muted); max-width: 60ch; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 var(--gap-md);
    }
    .meta { font-family: var(--font-mono); font-size: var(--fs-meta); color: var(--muted); }
    .num  { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    .topnav {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in oklch, var(--bg) 92%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .topnav-inner { display: flex; align-items: center; justify-content: space-between; padding-block: 12px; gap: var(--gap-md); }
    .topnav .logo { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -0.01em; color: var(--accent); }
    .pagefoot { padding-block: var(--gap-xl); color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.005em;
      transition: transform 0.05s ease, background 0.15s ease, border-color 0.15s ease;
      background: var(--surface);
      color: var(--fg);
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .btn-primary:hover { background: color-mix(in oklch, var(--accent) 85%, white); }
    .btn-secondary { background: transparent; color: var(--fg); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: transparent; padding-inline: 6px; }
    .btn-ghost:hover { color: var(--fg); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .tag {
      display: inline-flex; align-items: center;
      padding: 3px 8px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px;
    }
    .tag.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--fg);
      font: inherit;
      font-size: 14px;
    }
    .input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

    .hero { padding-block: clamp(48px, 8vw, 100px); text-align: center; }
    .hero h1 { margin-bottom: var(--gap-md); }
    .hero .lead { margin: 0 auto var(--gap-lg); }

    /* Spell list */
    .spell-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: var(--gap-md);
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
      cursor: pointer;
      transition: background 0.1s ease;
    }
    .spell-row:hover { background: var(--fg-soft); border-radius: var(--radius); padding-inline: 12px; margin-inline: -12px; }
    .spell-row .spell-name { font-family: var(--font-display); font-size: 16px; font-weight: 500; }
    .spell-row .spell-meta { color: var(--muted); font-size: 12px; }
    @media (max-width: 640px) {
      .spell-row { grid-template-columns: 1fr; gap: 4px; padding: 12px 0; }
    }

    /* Spell detail modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: color-mix(in oklch, var(--bg) 70%, transparent);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      max-width: 720px; width: 100%;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 50%; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 18px; line-height: 1;
    }
    .modal-close:hover { color: var(--fg); border-color: var(--accent); }
    .spell-detail h2 { font-family: var(--font-display); font-size: 28px; margin-bottom: 4px; }
    .spell-detail .subtitle { color: var(--muted); font-size: 13px; margin-bottom: var(--gap-lg); }
    .spell-detail .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--gap-md);
      margin-bottom: var(--gap-lg);
    }
    .spell-detail .stat-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
    .spell-detail .stat-item .label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
    .spell-detail .stat-item .value { font-size: 14px; color: var(--fg); }
    .spell-detail .desc { line-height: 1.65; color: var(--fg); }
    .spell-detail .desc p { margin: 0 0 10px; }
    .spell-detail .desc ul { margin: 0 0 10px; padding-left: 20px; }
    .spell-detail .desc li { margin-bottom: 4px; }
    .spell-detail .desc strong { color: var(--accent); }
    .spell-detail .upgrade { margin-top: var(--gap-lg); padding-top: var(--gap-lg); border-top: 1px solid var(--border); }

    /* Version selector */
    .version-bar {
      display: flex; gap: var(--gap-sm); flex-wrap: wrap;
      padding: var(--gap-md) 0;
      border-bottom: 1px solid var(--border);
    }

    /* Filters */
    .filter-bar {
      display: flex; gap: var(--gap-sm); flex-wrap: wrap;
      padding: var(--gap-md) 0;
      align-items: center;
    }
    .filter-group { display: flex; gap: var(--gap-xs); flex-wrap: wrap; align-items: center; }
    .filter-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-right: 4px; }

    /* School colors */
    .school-abjuration    { color: oklch(72% 0.08 220); }
    .school-conjuration   { color: oklch(72% 0.08 150); }
    .school-divination    { color: oklch(72% 0.08 85); }
    .school-enchantment   { color: oklch(72% 0.08 330); }
    .school-evocation     { color: oklch(68% 0.14 30); }
    .school-illusion      { color: oklch(72% 0.08 280); }
    .school-necromancy    { color: oklch(65% 0.06 150); }
    .school-transmutation { color: oklch(72% 0.08 70); }

    .level-cantrip { color: var(--accent); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const VERSIONS = [
      { key: 'spells-5E-2024-PTBR', label: 'D&D 5.5E (2024) — PT-BR', lang: 'ptbr', file: 'mprllfgi-spells-5E-2024-PTBR.json' },
      { key: 'spells-5E-2014-PTBR', label: 'D&D 5E (2014) — PT-BR', lang: 'ptbr', file: 'mprlkxzu-spells-5E-2014-PTBR.json' },
      { key: 'spells-5E-2024-EN', label: "Player's Handbook 5E 2024 — EN", lang: 'en', file: 'mprllfaq-spells-5E-2024-EN.json' },
      { key: 'spells-5E-2014-EN', label: "Player's Handbook 5E 2014 — EN", lang: 'en', file: 'mprlkxhg-spells-5E-2014-EN.json' },
    ];

    const SCHOOLS = [
      'abjuration', 'conjuration', 'divination', 'enchantment',
      'evocation', 'illusion', 'necromancy', 'transmutation'
    ];

    const SCHOOL_LABELS_PT = {
      abjuration: 'Abjuração', conjuration: 'Conjuração', divination: 'Adivinhação',
      enchantment: 'Encantamento', evocation: 'Evocação', illusion: 'Ilusão',
      necromancy: 'Necromancia', transmutation: 'Transmutação'
    };

    const CLASSES = [
      'artificer', 'bard', 'cleric', 'druid', 'paladin', 'ranger', 'sorcerer', 'warlock', 'wizard'
    ];

    const CLASS_LABELS_PT = {
      artificer: 'Artífice', bard: 'Bardo', cleric: 'Clérigo', druid: 'Druida',
      paladin: 'Paladino', ranger: 'Patrulheiro', sorcerer: 'Feiticeiro',
      warlock: 'Bruxo', wizard: 'Mago'
    };

    function useSpells(versionKey) {
      const [spells, setSpells] = useState([]);
      const [loading, setLoading] = useState(true);
      const version = VERSIONS.find(v => v.key === versionKey);

      useEffect(() => {
        setLoading(true);
        fetch(version.file)
          .then(r => r.json())
          .then(data => {
            const list = (data.spells || []).map(s => ({
              ...s,
              _search: (s.displayName || s.name || '').toLowerCase(),
              _levelNum: s.level ?? 0,
              _classes: (s.class || []).map(c => typeof c === 'string' ? c.toLowerCase() : ''),
              _school: (s.school || '').toLowerCase(),
            }));
            setSpells(list);
            setLoading(false);
          })
          .catch(err => {
            console.error(err);
            setSpells([]);
            setLoading(false);
          });
      }, [versionKey]);

      return { spells, loading, version };
    }

    function levelLabel(level, lang) {
      if (level === 0) return lang === 'ptbr' ? 'Truque' : 'Cantrip';
      if (lang === 'ptbr') return `${level}º Círculo`;
      return `Level ${level}`;
    }

    function schoolLabel(school, lang) {
      if (lang === 'ptbr') return SCHOOL_LABELS_PT[school] || school;
      return school.charAt(0).toUpperCase() + school.slice(1);
    }

    function classLabel(cls, lang) {
      if (lang === 'ptbr') return CLASS_LABELS_PT[cls] || cls;
      return cls.charAt(0).toUpperCase() + cls.slice(1);
    }

    function SpellDetail({ spell, version, onClose }) {
      const lang = version.lang;
      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [onClose]);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}>×</button>
            <div className="spell-detail">
              <h2>{spell.displayName || spell.name}</h2>
              <div className="subtitle">
                <span className={`pill school-${spell._school}`}>{schoolLabel(spell._school, lang)}</span>
                {' '}
                <span className="pill">{levelLabel(spell._levelNum, lang)}</span>
                {spell.ritual && <span className="pill">{lang === 'ptbr' ? 'Ritual' : 'Ritual'}</span>}
                {spell.concentration && <span className="pill">{lang === 'ptbr' ? 'Concentração' : 'Concentration'}</span>}
              </div>

              <div className="stat-grid">
                <div className="stat-item">
                  <div className="label">{lang === 'ptbr' ? 'Tempo de Conjuração' : 'Casting Time'}</div>
                  <div className="value">{spell.castTime}{spell.castTimeNote ? ` (${spell.castTimeNote})` : ''}</div>
                </div>
                <div className="stat-item">
                  <div className="label">{lang === 'ptbr' ? 'Alcance' : 'Range'}</div>
                  <div className="value">{spell.range}</div>
                </div>
                <div className="stat-item">
                  <div className="label">{lang === 'ptbr' ? 'Componentes' : 'Components'}</div>
                  <div className="value">{spell.components}{spell.componentsNote ? ` (${spell.componentsNote})` : ''}</div>
                </div>
                <div className="stat-item">
                  <div className="label">{lang === 'ptbr' ? 'Duração' : 'Duration'}</div>
                  <div className="value">{spell.duration}</div>
                </div>
              </div>

              <div className="desc" dangerouslySetInnerHTML={{ __html: spell.description || '' }} />

              {spell.upgradeDescription && (
                <div className="upgrade">
                  <div className="desc" dangerouslySetInnerHTML={{ __html: spell.upgradeDescription }} />
                </div>
              )}

              {spell.class && spell.class.length > 0 && (
                <div style={{ marginTop: 20 }}>
                  <div className="label" style={{ marginBottom: 6 }}>{lang === 'ptbr' ? 'Classes' : 'Classes'}</div>
                  <div className="row" style={{ gap: 6, flexWrap: 'wrap' }}>
                    {spell.class.map((c, i) => (
                      <span key={i} className="tag">{typeof c === 'string' ? classLabel(c.toLowerCase(), lang) : c}</span>
                    ))}
                  </div>
                </div>
              )}

              {spell.source && (
                <div style={{ marginTop: 16, fontSize: 12, color: 'var(--muted)' }}>
                  {lang === 'ptbr' ? 'Fonte' : 'Source'}: {spell.source}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [versionKey, setVersionKey] = useState('spells-5E-2024-PTBR');
      const [search, setSearch] = useState('');
      const [selectedSchools, setSelectedSchools] = useState(new Set());
      const [selectedClasses, setSelectedClasses] = useState(new Set());
      const [selectedLevels, setSelectedLevels] = useState(new Set());
      const [selectedSpell, setSelectedSpell] = useState(null);

      const { spells, loading, version } = useSpells(versionKey);

      const allLevels = useMemo(() => {
        const set = new Set(spells.map(s => s._levelNum));
        return Array.from(set).sort((a, b) => a - b);
      }, [spells]);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return spells.filter(s => {
          if (q && !s._search.includes(q)) return false;
          if (selectedSchools.size > 0 && !selectedSchools.has(s._school)) return false;
          if (selectedClasses.size > 0 && !s._classes.some(c => selectedClasses.has(c))) return false;
          if (selectedLevels.size > 0 && !selectedLevels.has(s._levelNum)) return false;
          return true;
        });
      }, [spells, search, selectedSchools, selectedClasses, selectedLevels]);

      const toggleSet = (set, val, setter) => {
        const next = new Set(set);
        if (next.has(val)) next.delete(val); else next.add(val);
        setter(next);
      };

      const clearFilters = () => {
        setSearch('');
        setSelectedSchools(new Set());
        setSelectedClasses(new Set());
        setSelectedLevels(new Set());
      };

      const hasFilters = search || selectedSchools.size || selectedClasses.size || selectedLevels.size;

      return (
        <>
          <header className="topnav">
            <div className="container topnav-inner">
              <span className="logo">Grimório de Magias</span>
              <div className="row" style={{ gap: 8 }}>
                {VERSIONS.map(v => (
                  <button
                    key={v.key}
                    className={`btn btn-sm ${versionKey === v.key ? 'btn-primary' : 'btn-secondary'}`}
                    onClick={() => { setVersionKey(v.key); setSelectedSpell(null); }}
                  >
                    {v.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main>
            <section className="section hero" data-od-id="hero" style={{ paddingBottom: 24 }}>
              <div className="container hero-center">
                <p className="eyebrow">DUNGEONS & DRAGONS 5E</p>
                <h1>Grimório de Magias</h1>
                <p className="lead">
                  {version.lang === 'ptbr'
                    ? 'Navegue pelas magias de D&D 5E. Filtre por classe, escola, nível ou busque pelo nome.'
                    : 'Browse D&D 5E spells. Filter by class, school, level, or search by name.'}
                </p>
              </div>
            </section>

            <section className="section" data-od-id="spell-list" style={{ paddingTop: 0 }}>
              <div className="container">
                {/* Search */}
                <div style={{ marginBottom: 16 }}>
                  <input
                    className="input"
                    type="text"
                    placeholder={version.lang === 'ptbr' ? 'Buscar magia...' : 'Search spell...'}
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                  />
                </div>

                {/* Filters */}
                <div className="filter-bar">
                  <div className="filter-group">
                    <span className="filter-label">{version.lang === 'ptbr' ? 'Escola' : 'School'}</span>
                    {SCHOOLS.map(s => (
                      <button
                        key={s}
                        className={`tag ${selectedSchools.has(s) ? 'active' : ''}`}
                        onClick={() => toggleSet(selectedSchools, s, setSelectedSchools)}
                      >
                        {schoolLabel(s, version.lang)}
                      </button>
                    ))}
                  </div>
                  <div className="filter-group">
                    <span className="filter-label">{version.lang === 'ptbr' ? 'Nível' : 'Level'}</span>
                    {allLevels.map(l => (
                      <button
                        key={l}
                        className={`tag ${selectedLevels.has(l) ? 'active' : ''}`}
                        onClick={() => toggleSet(selectedLevels, l, setSelectedLevels)}
                      >
                        {levelLabel(l, version.lang)}
                      </button>
                    ))}
                  </div>
                  <div className="filter-group">
                    <span className="filter-label">{version.lang === 'ptbr' ? 'Classe' : 'Class'}</span>
                    {CLASSES.map(c => (
                      <button
                        key={c}
                        className={`tag ${selectedClasses.has(c) ? 'active' : ''}`}
                        onClick={() => toggleSet(selectedClasses, c, setSelectedClasses)}
                      >
                        {classLabel(c, version.lang)}
                      </button>
                    ))}
                  </div>
                  {hasFilters && (
                    <button className="btn btn-ghost btn-sm" onClick={clearFilters}>
                      {version.lang === 'ptbr' ? 'Limpar filtros' : 'Clear filters'}
                    </button>
                  )}
                </div>

                {/* Results count */}
                <div style={{ margin: '12px 0', fontSize: 12, color: 'var(--muted)' }}>
                  {loading
                    ? (version.lang === 'ptbr' ? 'Carregando...' : 'Loading...')
                    : `${filtered.length} ${version.lang === 'ptbr' ? 'magias encontradas' : 'spells found'}`}
                </div>

                {/* Spell list */}
                <div>
                  {filtered.map(spell => (
                    <div
                      key={spell.name}
                      className="spell-row"
                      onClick={() => setSelectedSpell(spell)}
                    >
                      <div>
                        <div className="spell-name">{spell.displayName || spell.name}</div>
                        <div className="spell-meta">
                          {levelLabel(spell._levelNum, version.lang)} · {schoolLabel(spell._school, version.lang)}
                          {spell.ritual ? ' · Ritual' : ''}
                          {spell.concentration ? (version.lang === 'ptbr' ? ' · Concentração' : ' · Concentration') : ''}
                        </div>
                      </div>
                      <div className="spell-meta">{spell.castTime}</div>
                      <div className="spell-meta">{spell.range}</div>
                      <div className="spell-meta" style={{ textAlign: 'right' }}>
                        {(spell.class || []).slice(0, 3).map((c, i) => (
                          <span key={i} className="tag" style={{ marginLeft: 4 }}>{typeof c === 'string' ? classLabel(c.toLowerCase(), version.lang) : c}</span>
                        ))}
                        {(spell.class || []).length > 3 && <span className="tag" style={{ marginLeft: 4 }}>+{(spell.class || []).length - 3}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          </main>

          <footer className="pagefoot">
            <div className="container row-between">
              <span>Grimório de Magias · D&D 5E</span>
              <span className="meta">Dados: Wikidot / Heróis Anônimos / Simple Skans</span>
            </div>
          </footer>

          {selectedSpell && (
            <SpellDetail
              spell={selectedSpell}
              version={version}
              onClose={() => setSelectedSpell(null)}
            />
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
